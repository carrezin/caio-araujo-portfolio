<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>⚡</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f4f6fb" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#05060a" />
    <!-- Aplica o tema antes do primeiro paint para evitar flash claro/escuro -->
    <script>
      ;(function () {
        try {
          var saved = localStorage.getItem('theme')
          var dark = saved
            ? saved === 'dark'
            : window.matchMedia('(prefers-color-scheme: dark)').matches
          document.documentElement.classList.toggle('dark', dark)
        } catch (e) {
          document.documentElement.classList.add('dark')
        }
      })()
    </script>
    <title>Caio Araujo — Analista de TI & Desenvolvedor de Automações</title>
    <meta
      name="description"
      content="Analista de TI e Desenvolvedor de Automações, Integrações e Soluções Web. Especialista em CRM (Bitrix24), APIs, dashboards e ferramentas internas para empresas."
    />
    <meta name="author" content="Caio Ferreira de Araujo" />
    <meta
      name="keywords"
      content="automações, integrações, Bitrix24, CRM, APIs, dashboards, landing pages, desenvolvedor, analista de TI, Rio de Janeiro"
    />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Caio Araujo — Analista de TI & Desenvolvedor de Automações" />
    <meta
      property="og:description"
      content="Transformo processos manuais em soluções digitais inteligentes. Automações, integrações com CRM, APIs, dashboards e ferramentas internas para empresas."
    />
    <meta property="og:locale" content="pt_BR" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Caio Araujo — Analista de TI & Desenvolvedor de Automações" />
    <meta
      name="twitter:description"
      content="Transformo processos manuais em soluções digitais inteligentes. Automações, integrações com CRM, APIs e dashboards."
    />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
